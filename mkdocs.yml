site_name: Vox AI | Documentação Técnica

theme:
  name: material
  language: pt-BR
  logo: assets/rainbow.png
  favicon: assets/rainbow.png
  features:
    - navigation.sections

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: purple
      accent: red
      toggle:
        icon: material/brightness-7
        name: Mudar para o modo noturno

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: purple
      accent: red
      toggle:
        icon: material/brightness-4
        name: Mudar para o modo claro

markdown_extensions:
  - toc:
      toc_depth: 5
      permalink: true
  - sane_lists

copyright: "© Vox AI: conversas que importam | Licença GNU GPLv3"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/emn-f/vox-ai
      name: Repositório Principal

    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/projetovoxai/

    - icon: material/link-variant
      link: https://linktr.ee/vox_ai
      name: Linktree do Projeto

    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/assistentevox/
      name: Vox no LinkedIn
      
    - icon: fontawesome/brands/medium
      link: https://medium.com/@emnferreira/do-mvp-ao-rag-como-o-vox-ai-evoluiu-de-planilhas-para-uma-arquitetura-escalável-com-supabase-4c51b951ed56
      name: Artigos mais recente no Medium
      
    - icon: material/email
      link: mailto:assistentedeapoiolgbtvox@gmail.com
      name: Contato por E-mail
    
    - icon: fontawesome/brands/whatsapp
      link: https://wa.me/5571992348839
      name: Atendimento via WhatsApp

nav:
  - 1. Visão Geral: index.md
  - 2. Como Rodar Localmente: como-rodar-localmente.md
  - 3. Convenções do Projeto: convencoes-do-projeto.md
  - 4. Estrutura de Pastas e Arquivos: estrutura-do-projeto.md
  - 5. Stack Tecnológica e Ferramentas: stack.md
  - 6. Arquitetura do Sistema: arquitetura.md
  - 7. Módulos do Código: modulos-do-codigo.md
  - 8. Banco de Dados: banco-de-dados.md
  - 9. Cálculo Vetorial: calculo-intro.md
  - 10. Testes Automatizados: testes-automatizados.md
  - 11. Sistema de Segurança: sistema-de-seguranca.md
  - 12. CI/CD e Automação: ci-cd.md
  - 13. Git Cliff: git-cliff.md
  - 14. Scripts Utilitários: scripts-utilitarios.md
  - 15. Governança, Ética e Docs Legais: governanca-etica-docs-legais.md
  - 16. Glossário: glossario.md
  - 17. Links e Recursos Úteis: links-recursos-uteis.md